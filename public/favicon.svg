<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>

  <!-- 代码符号装饰 -->
  <text x="18" y="32" font-family="monospace" font-size="14" font-weight="bold" fill="white" opacity="0.6">&lt;/&gt;</text>

  <!-- 大写F字母 -->
  <text x="50" y="72" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="white">F</text>

  <!-- 装饰性代码括号 -->
  <text x="85" y="25" font-family="monospace" font-size="18" font-weight="bold" fill="white" opacity="0.8">{}</text>

  <!-- 前端技术装饰点 -->
  <circle cx="85" cy="40" r="3" fill="white" opacity="0.6"/>
  <circle cx="78" cy="48" r="2" fill="white" opacity="0.4"/>
</svg>