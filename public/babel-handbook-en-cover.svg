<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="bookCover2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <filter id="bookShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 书籍主体 -->
  <rect x="20" y="30" width="160" height="220" rx="3" fill="url(#bookCover2)" filter="url(#bookShadow2)"/>

  <!-- 书脊 -->
  <rect x="20" y="30" width="15" height="220" rx="2" fill="#0369a1"/>

  <!-- 书籍装饰线 -->
  <line x1="180" y1="50" x2="180" y2="230" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- 标题区域 -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="white">Babel</text>
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="white">Handbook</text>

  <!-- 分隔线 -->
  <line x1="50" y1="150" x2="150" y2="150" stroke="white" stroke-width="1" opacity="0.5"/>

  <!-- 语言标签 -->
  <rect x="70" y="165" width="60" height="25" rx="12" fill="rgba(255,255,255,0.2)"/>
  <text x="100" y="182" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="white">English</text>

  <!-- 底部装饰 -->
  <circle cx="100" cy="220" r="15" fill="rgba(255,255,255,0.2)"/>
  <text x="100" y="225" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">&lt;/&gt;</text>
</svg>