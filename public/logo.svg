<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景：简洁的圆角矩形 -->
  <rect width="120" height="120" rx="24" fill="url(#logoGrad)" filter="url(#shadow)"/>

  <!-- 代码符号装饰 -->
  <text x="60" y="28" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle" fill="white" opacity="0.6">&lt;/&gt;</text>

  <!-- 主要文字：Fan -->
  <text x="60" y="78" font-family="Arial Black, Impact, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="white">Fan</text>

  <!-- 底部中文：前端 -->
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="white" opacity="0.9">前端范儿</text>

  <!-- 装饰点 -->
  <circle cx="22" cy="35" r="2" fill="white" opacity="0.4"/>
  <circle cx="98" cy="35" r="1.5" fill="white" opacity="0.3"/>
</svg>